[application]

# dioxus project name
name = "freenet-email-app"

# default platform
default_platform = "web"

# Web build & serve dist path
out_dir = "dist"

# resource (static) file folder
asset_dir = "public"

[web.app]

# HTML <title> is set at runtime by `document::Title` in ui/src/app.rs
# using the `APP_NAME` constant in ui/src/lib.rs. Left blank here so
# there's only one source of truth for the consumer-facing product name.
title = ""

[web.watcher]

index_on_404 = true

watch_path = ["src"]

[web.resource]
style = []
script = []

[web.resource.dev]
script = []
