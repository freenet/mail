[config]
skip_core_tasks = true
default_to_workspace = false

[env]
CONTRACT_TARGET = "wasm32-unknown-unknown"
BUILD_PROFILE = "release"
# Note: fdev's `get_workspace_target_dir()` walks up from its compile-time
# CARGO_MANIFEST_DIR looking for a [workspace] Cargo.toml and panics with
# "Could not find workspace root" when fdev was installed from a different
# tree that no longer exists. Each build task below sets CARGO_TARGET_DIR
# explicitly to bypass that walk.

[tasks.clean]
description = "Clean build artifacts"
command = "cargo"
args = ["clean"]

# ─── Contract / delegate WASM builds via fdev ─────────────────────────────────

[tasks.build-inbox-contract]
description = "Build the inbox contract WASM + code hash"
script_runner = "bash"
script = '''
set -euo pipefail
cd "${CARGO_MAKE_WORKING_DIRECTORY}/contracts/inbox"
CARGO_TARGET_DIR="${CARGO_MAKE_WORKING_DIRECTORY}/target" fdev build --features contract
# Extract the code hash and write it to <repo>/build/inbox_code_hash
# where `ui/src/inbox.rs:50` includes it via `include_str!("../../build/inbox_code_hash")`.
# fdev's `build` command writes the WASM but not the `*_code_hash`
# text file, so we call `fdev inspect` separately (same pattern as
# the token-allocation-record / token-generator tasks below).
hash=$(CARGO_TARGET_DIR="${CARGO_MAKE_WORKING_DIRECTORY}/target" fdev inspect \
    build/freenet/freenet_email_inbox code | \
    grep 'code hash:' | cut -d' ' -f3)
mkdir -p "${CARGO_MAKE_WORKING_DIRECTORY}/build"
printf '%s' "$hash" > "${CARGO_MAKE_WORKING_DIRECTORY}/build/inbox_code_hash"
echo "wrote build/inbox_code_hash: $hash"
'''

[tasks.build-token-allocation-record]
description = "Build token-allocation-record contract WASM + code hash"
script_runner = "bash"
script = '''
set -euo pipefail
CRATE_DIR="${CARGO_MAKE_WORKING_DIRECTORY}/modules/antiflood-tokens/contracts/token-allocation-record"
cd "$CRATE_DIR"
CARGO_TARGET_DIR="${CARGO_MAKE_WORKING_DIRECTORY}/target" fdev build --features freenet-main-contract
# fdev logs the hash but doesn't write the `*_code_hash` file the UI
# expects — use `fdev inspect` to extract it.
hash=$(CARGO_TARGET_DIR="${CARGO_MAKE_WORKING_DIRECTORY}/target" fdev inspect \
    build/freenet/freenet_token_allocation_record code | \
    grep 'code hash:' | cut -d' ' -f3)
mkdir -p build
printf '%s' "$hash" > build/token_allocation_record_code_hash
echo "wrote build/token_allocation_record_code_hash: $hash"
'''

[tasks.build-token-generator]
description = "Build token-generator delegate WASM + code hash"
script_runner = "bash"
script = '''
set -euo pipefail
CRATE_DIR="${CARGO_MAKE_WORKING_DIRECTORY}/modules/antiflood-tokens/delegates/token-generator"
cd "$CRATE_DIR"
CARGO_TARGET_DIR="${CARGO_MAKE_WORKING_DIRECTORY}/target" fdev build \
    --package-type delegate --features freenet-main-delegate
hash=$(CARGO_TARGET_DIR="${CARGO_MAKE_WORKING_DIRECTORY}/target" fdev inspect \
    build/freenet/freenet_token_generator delegate | \
    grep 'code hash:' | cut -d' ' -f3)
mkdir -p build
printf '%s' "$hash" > build/token_generator_code_hash
echo "wrote build/token_generator_code_hash: $hash"
'''

[tasks.build-identity-management-delegate]
description = "Build identity-management delegate WASM + code hash"
script_runner = "bash"
script = '''
set -euo pipefail
CRATE_DIR="${CARGO_MAKE_WORKING_DIRECTORY}/modules/identity-management"
cd "$CRATE_DIR"
# identity-management needs both `contract` (to pull in freenet-stdlib's
# wasm-compatible memory helpers) and `freenet-main-delegate` (to emit the
# #[delegate] macro's extern "C" FFI wrapper).
CARGO_TARGET_DIR="${CARGO_MAKE_WORKING_DIRECTORY}/target" fdev build \
    --package-type delegate --features freenet-main-delegate,contract
hash=$(CARGO_TARGET_DIR="${CARGO_MAKE_WORKING_DIRECTORY}/target" fdev inspect \
    build/freenet/identity_management delegate | \
    grep 'code hash:' | cut -d' ' -f3)
mkdir -p build
printf '%s' "$hash" > build/identity_management_code_hash
echo "wrote build/identity_management_code_hash: $hash"
'''

[tasks.generate-identity-params]
description = "Generate the test identity-manager keypair and serialized params"
script_runner = "bash"
script = '''
set -euo pipefail
CRATE_DIR="${CARGO_MAKE_WORKING_DIRECTORY}/modules/identity-management"
OUT_DIR="$CRATE_DIR/build"
KEY_DIR="${CARGO_MAKE_WORKING_DIRECTORY}/test-contract/identity"
mkdir -p "$OUT_DIR" "$KEY_DIR"

# Treat a PLACEHOLDER stub (left over from the monorepo extraction)
# as missing so we regenerate. A real serialized Parameters file is
# ~100 bytes or more.
if [ -f "$OUT_DIR/identity-manager-params" ] && \
   [ "$(wc -c < "$OUT_DIR/identity-manager-params")" -gt 20 ] && \
   ! grep -q PLACEHOLDER "$OUT_DIR/identity-manager-params" 2>/dev/null; then
    echo "identity-manager-params already present, skipping generation"
    exit 0
fi

if [ -f "$KEY_DIR/identity-manager-key.private.pem" ]; then
    echo "reusing existing test key at $KEY_DIR"
    cargo run --quiet --manifest-path "$CRATE_DIR/Cargo.toml" --bin tool -- \
        --path "$OUT_DIR" --key "$KEY_DIR/identity-manager-key.private.pem"
else
    echo "generating fresh test key at $KEY_DIR"
    cargo run --quiet --manifest-path "$CRATE_DIR/Cargo.toml" --bin tool -- \
        --path "$OUT_DIR"
    # Move generated keypair into test-contract/identity so the params
    # file stays in build/ but the keys live next to other test fixtures.
    mv "$OUT_DIR/identity-manager-key.private.pem" "$KEY_DIR/"
    mv "$OUT_DIR/identity-manager-key.public.pem"  "$KEY_DIR/"
fi
echo "wrote $OUT_DIR/identity-manager-params"
'''

[tasks.generate-web-container-keys]
description = "Generate a fresh ed25519 keypair for the web-container publish pipeline"
script_runner = "bash"
script = '''
set -euo pipefail
KEY_FILE="${CARGO_MAKE_WORKING_DIRECTORY}/test-contract/web-container-keys.toml"
if [ -f "$KEY_FILE" ]; then
    echo "$KEY_FILE already exists; remove it first to rotate the test key"
    exit 1
fi
cargo run --quiet -p web-container-sign -- generate --output "$KEY_FILE"
'''

[tasks.build-contracts]
description = "Build all contracts/delegates WASM and code hash files"
dependencies = [
    "build-inbox-contract",
    "build-token-allocation-record",
    "build-token-generator",
    "build-identity-management-delegate",
    "generate-identity-params",
]

# ─── Web container, UI, dev ────────────────────────────────────────────────────

[tasks.build-web-container]
description = "Build the web container contract WASM"
command = "cargo"
args = ["build", "--profile", "${BUILD_PROFILE}", "--target", "${CONTRACT_TARGET}", "-p", "freenet-email-app-web"]

[tasks.build-ui]
description = "Build the Dioxus UI"
dependencies = ["build-contracts"]
command = "dx"
args = ["build", "--${BUILD_PROFILE}", "--features", "use-node"]
cwd = "./ui"

[tasks.build]
description = "Full release build (UI + contracts + web container)"
dependencies = ["build-ui", "build-web-container"]

[tasks.dev]
description = "Local Dioxus dev server"
dependencies = ["build-contracts"]
command = "dx"
args = ["serve", "--features", "use-node"]
cwd = "./ui"

[tasks.dev-example]
description = "Local dev server with example data, no node sync (offline)"
# Intentionally no `build-contracts` dependency: the whole point of this
# target is that it works on a clean clone with zero contract artifacts.
command = "dx"
args = ["serve", "--features", "example-data,no-sync", "--no-default-features"]
cwd = "./ui"

[tasks.build-ui-example-no-sync]
description = "Release build of the UI in offline mode (for CI/Playwright)"
command = "dx"
args = [
    "build",
    "--${BUILD_PROFILE}",
    "--features", "example-data,no-sync",
    "--no-default-features",
]
cwd = "./ui"

# ─── Publish pipeline (see AGENTS.md §Publishing) ─────────────────────────────
#
# The flow, in order:
#
#   build-ui  →  compress-webapp  →  sign-webapp{,-test}  →  \
#                update-published-contract  →  publish-email{,-test}
#
# `publish-all` wires the test variant end-to-end for local validation.
#
# `publish-email-test` uses the committed key at
# `test-contract/web-container-keys.toml` so two developers building from
# the same commit derive a byte-identical contract ID.
#
# `publish-email` (production) uses an uncommitted key at
# `~/.config/freenet-email/web-container-keys.toml`. Override with
# `WEB_CONTAINER_KEY_FILE=/path/to/keys.toml cargo make publish-email`.

[tasks.compress-webapp]
description = "Compress the built webapp into target/webapp/webapp.tar.xz"
dependencies = ["build-ui"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
# `dx` keys its output dir on the binary name (ui/Cargo.toml has
# `default-run = "app"`), not the package name.
DX_OUT="$ROOT/target/dx/app/release/web/public"
if [ ! -d "$DX_OUT" ]; then
    echo "error: dx build output not found at $DX_OUT" >&2
    echo "       (did \`cargo make build-ui\` succeed?)" >&2
    exit 1
fi
mkdir -p "$ROOT/target/webapp"
# Reproducibility: --sort=name, fixed --mtime, and --owner/--group=0
# are required for byte-identical archives across machines. GNU tar
# supports these flags; BSD tar (macOS default) does not. On macOS,
# install `gnu-tar` (`brew install gnu-tar`) to get a `gtar` binary.
# Without GNU tar the archive still signs and publishes, but two
# developers on two machines will derive different contract IDs,
# which defeats the committed-published-contract reproducibility
# goal. We warn loudly in that case.
if command -v gtar >/dev/null 2>&1; then
    TAR=gtar
elif tar --version 2>/dev/null | grep -qi 'gnu tar'; then
    TAR=tar
else
    echo "warning: GNU tar not found — the resulting archive will NOT be" >&2
    echo "         byte-identical across machines. Install gnu-tar for" >&2
    echo "         reproducible builds (macOS: \`brew install gnu-tar\`)." >&2
    TAR=""
fi
if [ -n "$TAR" ]; then
    "$TAR" --sort=name \
        --mtime='2024-01-01 00:00:00 UTC' \
        --owner=0 --group=0 --numeric-owner \
        -C "$DX_OUT" \
        -cJf "$ROOT/target/webapp/webapp.tar.xz" .
else
    tar -C "$DX_OUT" -cJf "$ROOT/target/webapp/webapp.tar.xz" .
fi
echo "wrote $ROOT/target/webapp/webapp.tar.xz ($(wc -c < "$ROOT/target/webapp/webapp.tar.xz") bytes)"
'''

[tasks.sign-webapp-test]
description = "Sign the compressed webapp with the committed test keypair"
dependencies = ["compress-webapp"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
KEY_FILE="$ROOT/test-contract/web-container-keys.toml"
if [ ! -f "$KEY_FILE" ]; then
    echo "error: $KEY_FILE not found" >&2
    echo "       run \`cargo make generate-web-container-keys\` first" >&2
    exit 1
fi
# Monotonic version: unix timestamp (seconds). The on-chain
# web-container update check requires strictly increasing versions;
# the prior commit-hash-to-u32 scheme was not monotonic and broke at
# v0.1.1 (a newer commit happened to hash lower than the deployed
# state). Timestamp is the simplest source that's always monotonic
# without coordination.
#
# Tradeoff: two developers signing at different times produce
# different signed payloads and therefore different contract IDs.
# `published-contract/contract-id.txt` is no longer reproducible from
# source. The committed snapshot is now the authoritative ID, and
# `update-published-contract*` rewrites it on every refresh.
version=$(date -u +%s)
echo "signing with version $version (unix timestamp)"
cargo run --quiet -p web-container-sign -- sign \
    --input "$ROOT/target/webapp/webapp.tar.xz" \
    --output "$ROOT/target/webapp/webapp.metadata" \
    --parameters "$ROOT/target/webapp/webapp.parameters" \
    --version "$version" \
    --key-file "$KEY_FILE"
'''

[tasks.sign-webapp]
description = "Sign the compressed webapp with the production keypair"
dependencies = ["compress-webapp"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
KEY_FILE="${WEB_CONTAINER_KEY_FILE:-$HOME/.config/freenet-email/web-container-keys.toml}"
if [ ! -f "$KEY_FILE" ]; then
    echo "error: production key file not found at $KEY_FILE" >&2
    echo "" >&2
    echo "generate one out of band with:" >&2
    echo "  scripts/generate-production-key.sh" >&2
    echo "" >&2
    echo "or override the location:" >&2
    echo "  WEB_CONTAINER_KEY_FILE=/path/to/keys.toml cargo make publish-email" >&2
    exit 1
fi
# Monotonic version: unix timestamp (seconds). See sign-webapp-test
# for the rationale — short version: the on-chain update check needs
# strict monotonicity, the prior commit-hash scheme didn't provide it.
version=$(date -u +%s)
echo "signing with production key at $KEY_FILE, version $version (unix timestamp)"
cargo run --quiet -p web-container-sign -- sign \
    --input "$ROOT/target/webapp/webapp.tar.xz" \
    --output "$ROOT/target/webapp/webapp.metadata" \
    --parameters "$ROOT/target/webapp/webapp.parameters" \
    --version "$version" \
    --key-file "$KEY_FILE"
'''

[tasks.update-published-contract]
description = "Copy the signed test artifacts into published-contract/ and record the contract ID"
dependencies = ["sign-webapp-test", "build-web-container"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
WASM="$ROOT/target/wasm32-unknown-unknown/release/freenet_email_app_web.wasm"
PARAMS="$ROOT/target/webapp/webapp.parameters"
if [ ! -f "$WASM" ]; then
    echo "error: $WASM not found (did cargo make build-web-container run?)" >&2
    exit 1
fi
if [ ! -f "$PARAMS" ]; then
    echo "error: $PARAMS not found (did sign-webapp-test run?)" >&2
    exit 1
fi

# Ask fdev for the derived contract ID. This is hash(wasm, parameters)
# and is fully deterministic given byte-identical inputs.
contract_id=$(CARGO_TARGET_DIR="$ROOT/target" fdev get-contract-id \
    --code "$WASM" --parameters "$PARAMS")
if [ -z "$contract_id" ]; then
    echo "error: fdev get-contract-id returned an empty ID" >&2
    echo "       fdev version: $(fdev --version 2>&1 || echo unknown)" >&2
    exit 1
fi

mkdir -p "$ROOT/published-contract"
cp "$WASM"   "$ROOT/published-contract/web_container_contract.wasm"
cp "$PARAMS" "$ROOT/published-contract/webapp.parameters"
printf '%s\n' "$contract_id" > "$ROOT/published-contract/contract-id.txt"

echo "published-contract/ updated:"
echo "  contract-id.txt             = $contract_id"
echo "  web_container_contract.wasm = $(wc -c < "$ROOT/published-contract/web_container_contract.wasm") bytes"
echo "  webapp.parameters           = $(wc -c < "$ROOT/published-contract/webapp.parameters") bytes"
echo ""
echo "commit these changes with a message referencing the release in #6 / #9."
'''

[tasks.update-published-contract-prod]
description = "Copy the signed PRODUCTION artifacts into published-contract/ and record the contract ID"
dependencies = ["sign-webapp", "build-web-container"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
WASM="$ROOT/target/wasm32-unknown-unknown/release/freenet_email_app_web.wasm"
PARAMS="$ROOT/target/webapp/webapp.parameters"
if [ ! -f "$WASM" ]; then
    echo "error: $WASM not found (did cargo make build-web-container run?)" >&2
    exit 1
fi
if [ ! -f "$PARAMS" ]; then
    echo "error: $PARAMS not found (did sign-webapp run?)" >&2
    exit 1
fi

contract_id=$(CARGO_TARGET_DIR="$ROOT/target" fdev get-contract-id \
    --code "$WASM" --parameters "$PARAMS")
if [ -z "$contract_id" ]; then
    echo "error: fdev get-contract-id returned an empty ID" >&2
    exit 1
fi

mkdir -p "$ROOT/published-contract"
cp "$WASM"   "$ROOT/published-contract/web_container_contract.wasm"
cp "$PARAMS" "$ROOT/published-contract/webapp.parameters"
printf '%s\n' "$contract_id" > "$ROOT/published-contract/contract-id.txt"

echo "published-contract/ updated (PRODUCTION):"
echo "  contract-id.txt             = $contract_id"
echo "  web_container_contract.wasm = $(wc -c < "$ROOT/published-contract/web_container_contract.wasm") bytes"
echo "  webapp.parameters           = $(wc -c < "$ROOT/published-contract/webapp.parameters") bytes"
'''

[tasks.publish-email-test]
description = "Publish the test build of the webapp to a local Freenet node"
dependencies = ["sign-webapp-test", "build-web-container"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
if [ ! -f "$ROOT/published-contract/contract-id.txt" ]; then
    echo "error: published-contract/contract-id.txt missing" >&2
    echo "       run \`cargo make update-published-contract\` first" >&2
    exit 1
fi
contract_id=$(cat "$ROOT/published-contract/contract-id.txt")
echo "publishing with test contract id $contract_id"
# Publish against the committed artifacts, not the freshly built ones,
# so we fail loudly if the committed published-contract/ is stale
# relative to HEAD.
# `--port` honours FREENET_LOCAL_PORT so we publish to the same isolated
# node `run-node` started — otherwise fdev defaults to 7509 and publishes
# to whatever node owns it, which may be a sibling worktree.
PORT="${FREENET_LOCAL_PORT:-7509}"
fdev --port "$PORT" publish \
    --code "$ROOT/published-contract/web_container_contract.wasm" \
    --parameters "$ROOT/published-contract/webapp.parameters" \
    contract \
    --webapp-archive "$ROOT/target/webapp/webapp.tar.xz" \
    --webapp-metadata "$ROOT/target/webapp/webapp.metadata"
'''

[tasks.publish-email-iso]
description = "Publish the test webapp to the isolated 2-node gateway (port 7510)"
dependencies = ["sign-webapp-test", "build-web-container"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
PORT="${FREENET_ISO_GW_PORT:-7510}"
if [ ! -f "$ROOT/published-contract/contract-id.txt" ]; then
    echo "error: published-contract/contract-id.txt missing" >&2
    echo "       run \`cargo make update-published-contract\` first" >&2
    exit 1
fi
contract_id=$(cat "$ROOT/published-contract/contract-id.txt")
echo "publishing with test contract id $contract_id to iso gateway :$PORT"
fdev --port "$PORT" publish \
    --code "$ROOT/published-contract/web_container_contract.wasm" \
    --parameters "$ROOT/published-contract/webapp.parameters" \
    contract \
    --webapp-archive "$ROOT/target/webapp/webapp.tar.xz" \
    --webapp-metadata "$ROOT/target/webapp/webapp.metadata"
'''

[tasks.publish-email]
description = "Publish the production build of the webapp to Freenet"
dependencies = ["sign-webapp", "build-web-container"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
if [ ! -f "$ROOT/published-contract/contract-id.txt" ]; then
    echo "error: published-contract/contract-id.txt missing" >&2
    exit 1
fi
contract_id=$(cat "$ROOT/published-contract/contract-id.txt")
echo "publishing with production contract id $contract_id"
fdev publish \
    --code "$ROOT/published-contract/web_container_contract.wasm" \
    --parameters "$ROOT/published-contract/webapp.parameters" \
    contract \
    --webapp-archive "$ROOT/target/webapp/webapp.tar.xz" \
    --webapp-metadata "$ROOT/target/webapp/webapp.metadata"
'''

[tasks.publish-all]
description = "End-to-end test publish: build → sign → update-published-contract → publish-email-test"
dependencies = [
    "build",
    "update-published-contract",
    "publish-email-test",
]

[tasks.publish-production]
description = "End-to-end PRODUCTION publish: build → sign with prod key → update-published-contract → publish-email"
dependencies = [
    "build",
    "update-published-contract-prod",
    "publish-email",
]

[tasks.publish]
description = "Alias for publish-email-test (the old broken stub has been replaced)"
dependencies = ["publish-email-test"]

[tasks.run-node]
description = "Run Freenet local node (isolated to this worktree)"
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
# Per-worktree state. Without this, parallel worktrees share
# ~/Library/Application Support/freenet and step on each other; HOME
# also leaks ~/.config/freenet/gateways.toml so the "local" node phones
# bootstrap peers. Override both.
DATA_DIR="${FREENET_LOCAL_DATA_DIR:-$ROOT/.run-node/data}"
NODE_HOME="${FREENET_LOCAL_HOME:-$ROOT/.run-node/home}"
PORT="${FREENET_LOCAL_PORT:-7509}"
mkdir -p "$DATA_DIR" "$NODE_HOME/.config/freenet"
# Empty gateways to fully isolate from the public network.
[ -f "$NODE_HOME/.config/freenet/gateways.toml" ] || \
    printf 'gateways = []\n' > "$NODE_HOME/.config/freenet/gateways.toml"
echo "freenet local: port=$PORT data-dir=$DATA_DIR home=$NODE_HOME"
RUST_BACKTRACE=1 RUST_LOG=freenet=debug,freenet_core=debug,info \
    HOME="$NODE_HOME" \
    freenet local --data-dir "$DATA_DIR" --port "$PORT"
'''

[tasks.test]
description = "Run all tests"
command = "cargo"
args = ["test", "--workspace"]

[tasks.test-inbox]
description = "Run inbox contract integration tests (host build)"
command = "cargo"
args = [
    "test",
    "-p", "freenet-email-inbox",
    "--features", "contract",
    "--test", "integration",
]

[tasks.clippy]
description = "Run clippy on all packages"
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--", "-D", "warnings"]

# ─── Playwright E2E tests ────────────────────────────────────────────────────

[tasks.test-ui-playwright-setup]
description = "Install Playwright browsers and dependencies (one-time setup)"
script_runner = "bash"
script = '''
cd "${CARGO_MAKE_WORKING_DIRECTORY}/ui/tests" && npm install && npx playwright install --with-deps chromium firefox webkit
'''

[tasks.test-ui-playwright]
description = "Build offline UI, start dev server, run Playwright tests, tear down"
dependencies = ["build-ui-example-no-sync"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
# Pick a port: honour FREENET_EMAIL_DX_PORT if set, else find the first
# free port in 8082..8182 so parallel worktrees / dev servers don't clash.
if [ -n "${FREENET_EMAIL_DX_PORT:-}" ]; then
    PORT="$FREENET_EMAIL_DX_PORT"
else
    PORT=""
    for candidate in $(seq 8082 8182); do
        if ! lsof -ti:"$candidate" >/dev/null 2>&1; then
            PORT="$candidate"
            break
        fi
    done
    if [ -z "$PORT" ]; then
        echo "ERROR: no free port in 8082..8182" >&2
        exit 1
    fi
fi
echo "Using dev-server port $PORT"

# Start dev server in background.
cd "$ROOT/ui" && dx serve --port "$PORT" --features example-data,no-sync --no-default-features &
DX_PID=$!
trap "kill $DX_PID 2>/dev/null || true" EXIT

# Poll for readiness.
echo "Waiting for dev server on port $PORT..."
SERVER_READY=false
for i in $(seq 1 90); do
    # Match on the wasm bundle script tag — the dx 0.7 served HTML no
    # longer contains a literal `freenet-email-app` string the way the
    # earlier dx version did.
    if curl -s "http://localhost:$PORT" 2>/dev/null | grep -q "wasm/app.js"; then
        echo "Server ready after $((i * 3))s"
        sleep 3
        SERVER_READY=true
        break
    fi
    sleep 3
done
if [ "$SERVER_READY" != "true" ]; then
    echo "ERROR: Dev server failed to start within 270s"
    exit 1
fi

# Run Playwright. Pass PORT through so the config picks the same one.
cd "$ROOT/ui/tests" && FREENET_EMAIL_BASE_URL="http://127.0.0.1:$PORT" npx playwright test
'''

# ─── Real-node integration helpers ───────────────────────────────────────────

[tasks.iso-nodes-up]
description = "Start isolated 2-node Freenet network (gateway 7510 + peer 7511)"
script_runner = "bash"
script = '''
"${CARGO_MAKE_WORKING_DIRECTORY}/scripts/run-isolated-nodes.sh" up
'''

[tasks.iso-nodes-down]
description = "Stop the isolated 2-node Freenet network (preserves data)"
script_runner = "bash"
script = '''
"${CARGO_MAKE_WORKING_DIRECTORY}/scripts/run-isolated-nodes.sh" down
'''

[tasks.iso-nodes-wipe]
description = "Stop + wipe the isolated 2-node Freenet network data"
script_runner = "bash"
script = '''
"${CARGO_MAKE_WORKING_DIRECTORY}/scripts/run-isolated-nodes.sh" wipe
'''

[tasks.iso-nodes-status]
description = "Show status of the isolated 2-node Freenet network"
script_runner = "bash"
script = '''
"${CARGO_MAKE_WORKING_DIRECTORY}/scripts/run-isolated-nodes.sh" status
'''

[tasks.test-e2e-real-node]
description = "Real-node E2E: wipe iso nodes → publish → run live-node spec → tear down (set FREENET_E2E_KEEP=1 to leave nodes up)"
dependencies = ["build", "update-published-contract"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
ISO_ROOT="${FREENET_E2E_ROOT:-$HOME/freenet-mail-iso}"
GW_PORT="${FREENET_ISO_GW_PORT:-7510}"
KEEP="${FREENET_E2E_KEEP:-0}"

cleanup() {
    if [ "$KEEP" = "1" ]; then
        echo "FREENET_E2E_KEEP=1 — leaving iso nodes up at $ISO_ROOT"
    else
        bash "$ROOT/scripts/run-isolated-nodes.sh" down
    fi
}
trap cleanup EXIT

# Always start from a clean slate so day-1 AFT cap doesn't carry between runs.
bash "$ROOT/scripts/run-isolated-nodes.sh" wipe
bash "$ROOT/scripts/run-isolated-nodes.sh" up

# Publish to the iso gateway (port-overridden fdev).
FREENET_ISO_GW_PORT="$GW_PORT" cargo make publish-email-iso

CONTRACT_ID="$(cat "$ROOT/published-contract/contract-id.txt")"
BASE_URL="http://127.0.0.1:$GW_PORT/v1/contract/web/$CONTRACT_ID/"
echo "running live-node spec against $BASE_URL"

cd "$ROOT/ui/tests" && \
    FREENET_EMAIL_BASE_URL="$BASE_URL" \
    FREENET_ISO_GW_PORT="$GW_PORT" \
    FREENET_ISO_GW_LOG_DIR="$ISO_ROOT/gw/logs" \
    npx playwright test live-node.spec.ts --project=chromium
'''
