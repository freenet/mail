name: Check Published Contract Drift

on:
  pull_request:
    paths:
      - 'contracts/web-container/**'
      - 'contracts/facade/**'
      - 'contracts/facade-types/**'
      - 'contracts/facade-loader/**'
      - 'common/**'
      - 'ui/**'
      - 'published-contract/**'
      - 'test-contract/web-container-keys.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
  push:
    branches: [main]
    paths:
      - 'contracts/web-container/**'
      - 'contracts/facade/**'
      - 'contracts/facade-types/**'
      - 'contracts/facade-loader/**'
      - 'common/**'
      - 'ui/**'
      - 'published-contract/**'
      - 'test-contract/web-container-keys.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'

jobs:
  check-drift:
    # ubicloud-standard-8 — rebuilding the published contract from
    # source involves a full wasm32 compile of the web-container +
    # webapp, same compile-bound profile as build.yml.
    runs-on: ubicloud-standard-8
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 2

      - name: Install Rust
        # Pinned (issue #206): facade.wasm bytes are sensitive to rustc
        # version. Stable-channel bumps would silently rotate the facade
        # contract id. Keep in sync with rust-toolchain.toml.
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo-installed binaries
        id: cache-bins
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/bin/cargo-binstall
            ~/.cargo/bin/fdev
            ~/.cargo/bin/dx
          key: ${{ runner.os }}-cargo-bins-fdev-0.3.201-dx-0.7.3-v3

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        if: steps.cache-bins.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@cargo-binstall

      - name: Install cargo-make
        if: steps.cache-bins.outputs.cache-hit != 'true'
        run: cargo binstall -y --force cargo-make

      - name: Install Dioxus CLI
        if: steps.cache-bins.outputs.cache-hit != 'true'
        run: cargo binstall -y --force --version 0.7.3 dioxus-cli

      - name: Install fdev
        if: steps.cache-bins.outputs.cache-hit != 'true'
        run: cargo install --force fdev

      - name: Rebuild published contract from source
        run: cargo make update-published-contract

      - name: Compare rebuilt snapshot against committed
        run: |
          # NOTE: this step is informational-only until Phase 5 (#9)
          # rebuilds the `published-contract/` snapshot from CI. The
          # committed snapshot was produced on macOS; Ubuntu-produced
          # WASM will differ byte-for-byte from it until the snapshot
          # is rebuilt on Linux and committed. We print the diff as a
          # warning and exit 0 so the job reports green.
          if ! git diff --exit-code -- published-contract/; then
            echo "::warning::published-contract/ drifted from source."
            echo ""
            echo "This is expected until Phase 5 (#9) rebuilds the"
            echo "committed snapshot on Linux CI. The diagnostic below"
            echo "will become actionable once that lands:"
            echo ""
            git diff -- published-contract/ || true
            echo ""
            echo "To refresh manually:"
            echo "  cargo make update-published-contract"
            echo "  git add published-contract/"
            echo ""
            exit 0
          fi
          echo "✅ published-contract/ is in sync with source."

      # Issue #206 (closes the Phase 1 informational gate). The facade
      # contract id is intended to stay byte-stable across releases.
      # Both prerequisites are now in place:
      #   • rustc pinned in rust-toolchain.toml (and the dtolnay action
      #     in this workflow uses the same pinned version).
      #   • Snapshot at published-contract/facade.{wasm,parameters,id.txt}
      #     produced under linux/amd64 with that pinned rustc.
      # Any drift in the rebuilt wasm is now a release blocker —
      # the rebuild MUST match the committed snapshot byte-for-byte.
      - name: Verify facade wasm byte-equality (issue #206)
        id: facade-verify
        run: |
          if [ ! -f published-contract/facade.wasm ]; then
            echo "::error::published-contract/facade.wasm missing."
            echo "Bootstrap the snapshot via scripts/build-facade-snapshot-linux.sh"
            echo "and commit published-contract/facade.{wasm,parameters,id.txt}."
            exit 1
          fi
          bash scripts/check-facade-byte-equal.sh

      # Bootstrap helper (#206): on drift, upload the freshly-built
      # facade.wasm so an operator can download it, recompute the
      # contract id, and commit the canonical CI-built snapshot. Local
      # docker amd64 emulation (qemu) produces different bytes from
      # native ubicloud amd64 — only CI bytes are canonical.
      - name: Upload rebuilt facade.wasm on drift
        if: failure() && steps.facade-verify.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: facade-wasm-rebuilt-${{ github.sha }}
          path: contracts/facade/target/wasm32-unknown-unknown/release/freenet_email_facade.wasm
          if-no-files-found: warn
          retention-days: 7
